<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <title>ASCILINE Remix Output</title>
    <link rel="icon" href="data:,">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #030405;
            color: #f4f7ff;
            font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        }

        #output-stage {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: #030405;
        }

        #output-stage canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            max-height: none !important;
            object-fit: cover;
            image-rendering: pixelated;
        }

        #output-status {
            position: fixed;
            left: 16px;
            bottom: 14px;
            max-width: min(760px, calc(100vw - 32px));
            color: rgba(244, 247, 255, .7);
            font: 12px/1.35 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
            letter-spacing: 0;
            text-transform: uppercase;
            pointer-events: none;
        }

        .output-bar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            opacity: .18;
            transition: opacity .15s ease;
        }

        .output-bar:hover {
            opacity: 1;
        }

        button {
            min-height: 30px;
            border: 1px solid #5f69c8;
            border-radius: 0;
            background: #09006f;
            color: #f4f7ff;
            padding: 0 10px;
            font: 12px/1 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
            text-transform: uppercase;
            cursor: pointer;
        }

        button:hover {
            background: #1c12a0;
        }
    </style>
</head>

<body>
    <div id="output-stage"></div>
    <div id="output-status">Waiting for renderer state</div>
    <div class="output-bar">
        <button id="fullscreen-output" type="button">Fullscreen</button>
        <button id="close-output" type="button">Close</button>
    </div>
    <script type="module" src="output.js"></script>
</body>

</html>
