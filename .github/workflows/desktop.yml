name: Desktop

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-and-tauri:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # `apple-metal` in the native wgpu stack needs the macOS 26 Metal SDK.
          - macos-26
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Verify desktop build
        run: npm run check:desktop
